name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build

      - name: Unit tests
        run: npx vitest run tests/unit --reporter=default --reporter=junit --outputFile.junit=test-results/unit.xml

      - name: Upload unit test report
        if: always()
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        with:
          name: Unit Tests
          path: test-results/unit.xml
          reporter: java-junit

  publish:
    needs: [build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - name: Set version and tag
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          BRANCH="${GITHUB_REF_NAME}"
          RUN="${GITHUB_RUN_NUMBER}"

          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9-]/-/g')

          if [ "$BRANCH" = "master" ]; then
            TAG="latest"
            HEAD_TAG=$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$' | head -n 1)
            if [ -z "$HEAD_TAG" ]; then
              echo "No version tag found on HEAD for master branch."
              exit 1
            fi
            VERSION="${HEAD_TAG#v}"
          elif [ "$BRANCH" = "develop" ]; then
            TAG="dev"
            LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
            LATEST_TAG="${LATEST_TAG#v}"
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            NEXT_MINOR=$((MINOR + 1))
            VERSION="${MAJOR}.${NEXT_MINOR}.0-develop.${RUN}"
          elif [[ "$BRANCH" == release/* ]]; then
            TAG="next"
            VERSION="${BASE_VERSION}-next.${RUN}"
          else
            TAG="dev"
            VERSION="${BASE_VERSION}-${SAFE_BRANCH}.${RUN}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version
        if: steps.version.outputs.version != steps.version.outputs.base_version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --tag "${{ steps.version.outputs.tag }}" --provenance --access public

  release:
    needs: publish
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: version
        run: |
          HEAD_TAG=$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$' | head -n 1)
          if [ -z "$HEAD_TAG" ]; then
            echo "No version tag found on HEAD for master branch."
            exit 1
          fi
          echo "version=${HEAD_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
